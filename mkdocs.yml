site_name: Developer Portal Documentation
site_description: Complete guide for using the Developer Portal
site_author: MARS Platform Team
repo_url: https://github.com/mars-platform-team/devportal-docs
edit_uri: edit/main/docs/
nav:
  - Home: index.md
  - Getting Started:
      - Quick Start Guide: getting-started/quick-start.md
      - First Login: getting-started/first-login.md
      - Migration from Epinio: getting-started/migration-guide.md
  - User Guides:
      - Application Management: user-guides/application-management.md
      - Monitoring & Logging: user-guides/monitoring-logging.md
      - Configuration Management: user-guides/configuration.md
      - Role-Based Access: user-guides/rbac.md
  - Beta Testing:
      - Testing Guide: beta-testing/testing-guide.md
  - Migration:
      - Feature Comparison: migration/feature-comparison.md
      - Migration Process: migration/migration-process.md
      - FAQ: migration/faq.md
  - Reference:
      - Troubleshooting: reference/troubleshooting.md
      - Glossary: reference/glossary.md
      - Support: reference/support.md
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github
plugins:
  - search
  - techdocs-core
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
